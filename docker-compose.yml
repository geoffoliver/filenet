services:
  filenet:
    build: .
    restart: unless-stopped
    ports:
      - "3009:3000"   # UI + management API — access the app at http://localhost:3009
      - "7734:7734"   # P2P WebSocket — forward this port on your router
    volumes:
      - filenet-data:/app/data          # SQLite database + keys (persistent)
      - /path/to/your/files:/shared     # Add one volume mount per shared folder
      # - /path/to/more/files:/shared2  # Example second shared folder
      - /path/to/downloads:/downloads   # Where downloaded files are saved
    environment:
      PORT: "3000"
      DATABASE_URL: "file:./data/filenet.db"
      # To share multiple folders, mount each one above and list them colon-separated:
      # SHARED_FOLDERS: "/shared:/shared2"
      SHARED_FOLDERS: "/shared:/downloads"
      DOWNLOAD_FOLDER: "/downloads"
      # P2P_PORT: "7734"   # Uncomment to override the port stored in settings

volumes:
  filenet-data:
